<!-- Chatbot Modal -->
<div id="chatbotModal" class="chatbot-modal">
  <div class="chatbot-modal-content">
    <div class="chatbot-header">
      <div class="chatbot-title">
        <i class="fas fa-robot"></i>
        <span id="chatbotTitleText">Ask My GitHub</span>
        </button>
      </div>
      <div
        class="chatbot-controls"
        style="display: flex; gap: 10px; align-items: center"
      >
        <button
          id="endChatBtnModal"
          class="btn-secondary"
          style="
            padding: 0.3rem 0.8rem;
            font-size: 0.8rem;
            border-radius: 20px;
            color: white;
            border-color: rgba(255, 255, 255, 0.2);
          "
        >
          End Interview
        </button>
        <!-- barely visible close button: small X that simply hides modal -->
        <button
          id="closeChatBtn"
          class="btn-close"
          title="Close without summary"
          style="font-size:0.6rem; opacity:0.15; background:transparent; border:none; color:#fff; margin-left:0.5rem; cursor:pointer;"
        >
          ✕
        </button>
        <div class="status-dot"></div>
      </div>
    </div>
    <div class="chatbot-messages" id="chatMessages">
      <div class="message ai-message intro-message">
        <div class="intro-badge">AI Assistant</div>
        Hello! I'm Vijay's AI assistant supported by GitHub RAG. Ask me about
        his skills, projects, or experience to see if he's a good fit for your
        team.
      </div>
    </div>
    <div class="chatbot-input-area">
      <div class="chatbot-hints-container" id="hintsContainer">
        <div class="chatbot-hint" id="hintText"></div>
      </div>
      <input
        type="text"
        id="userInput"
        class="chatbot-input"
        placeholder="Ask anything..."
      />
      <button id="sendBtn" class="send-btn">
        <i class="fas fa-paper-plane"></i>
      </button>
    </div>
  </div>
</div>

<!-- Floating Action Button -->
<button id="chatFab" class="chat-fab">
  <i class="fas fa-comment-dots"></i>
</button>
